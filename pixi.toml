[workspace]
authors = ["ben <ben.uzh@proton.me>"]
channels = ["conda-forge", "bioconda"]
name = "scanpy"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "python check.py"
validate = "python validators/pca_output.py"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/scanpy.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/scanpy.yml"

[dependencies]
python = ">=3.14.4,<3.15"
h5py = ">=3.16.0,<4"
scanpy = ">=1.12.1,<2"
anndata = ">=0.12.11,<0.13"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
polars = ">=1,<2"
python-igraph = ">=0.11,<1"   # Leiden backend (cluster.py)
leidenalg = ">=0.10,<1"

# env for quick dev tasks - avoid the regular deps
[feature.dev.dependencies]
python = ">=3.11"
pyyaml = ">=6"
curl = "*"

[feature.dev.tasks]
sync = "sh -c 'curl -fsSL https://raw.githubusercontent.com/omni-scrna/boilerplate/${BRANCH:-main}/scripts/pull.py | python -'"

# test feature layers pytest onto the default runtime env
[feature.test.dependencies]
pytest = ">=8"

[feature.test.tasks]
test = "pytest"

[environments]
dev = { features = ["dev"], no-default-feature = true }
test = { features = ["test"] }

[pypi-dependencies]
obkit = ">=0.0.3, <0.0.4"
