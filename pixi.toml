[workspace]
authors = ["ben <ben.uzh@proton.me>"]
channels = ["conda-forge", "bioconda"]
name = "scanpy"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "python check.py"
validate = "python validators/pca_output.py"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/scanpy.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/scanpy.yml"

[dependencies]
python = ">=3.14.4,<3.15"
h5py = ">=3.16.0,<4"
scanpy = ">=1.12.1,<2"
anndata = ">=0.12.11,<0.13"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
polars = ">=1,<2"

# Bootstrap tooling, kept out of the (heavy) default env. `pixi run sync` vendors
# the shared common/ — no sibling checkout needed: it fetches pull.py from the
# boilerplate over HTTP and runs it (pull.py is CWD-relative and only needs
# pyyaml + git). Which branch the SCRIPT is fetched from is `$BRANCH` (default
# main); override it to test an unmerged boilerplate branch:
#     BRANCH=my-branch pixi run -e bootstrap sync
# Note this only switches the pull.py SCRIPT. The vendored CONTENT comes from
# `boilerplate.ref` (and each benchmark's `ref`) in omnibenchmark.yaml — set
# those to the same branch to test unmerged content too.
[feature.bootstrap.dependencies]
python = ">=3.11"
pyyaml = ">=6"
curl = "*"

[feature.bootstrap.tasks]
sync = "sh -c 'curl -fsSL https://raw.githubusercontent.com/omni-scrna/boilerplate/${BRANCH:-main}/scripts/pull.py | python -'"

[environments]
bootstrap = { features = ["bootstrap"], no-default-feature = true }

[pypi-dependencies]
obkit = ">=0.0.3, <0.0.4"
