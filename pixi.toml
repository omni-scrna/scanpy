[workspace]
authors = ["ben <ben.uzh@proton.me>"]
channels = ["conda-forge", "bioconda"]
name = "scanpy"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "python check.py"
test = "pytest"
lint = "ruff check ."
fmt = "ruff format ."
typecheck = "ty check"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/scanpy.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/scanpy.yml"

[dependencies]
python = ">=3.14.4,<3.15"
h5py = ">=3.16.0,<4"
scanpy = ">=1.12.1,<2"
anndata = ">=0.12.11,<0.13"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
polars = ">=1,<2"
python-igraph = ">=1.0.0,<2"
leidenalg = ">=0.11.0,<0.12"
pytest = ">=9.0.3,<10"
ruff = ">=0.15.12,<0.16"
ty = ">=0.0.35,<0.0.36"
