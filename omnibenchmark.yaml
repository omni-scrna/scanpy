# OmniBenchmark Module Configuration

entrypoints:
  pca: pca.py
  pca-prof: denet pca.py
  knn: knn.py
  cluster: cluster.py
  normalize: normalize.py
  feat-select: feat-select.py

# common code
# `pixi run -e dev sync` (from this module root) refreshes it.
templates:
  repo: https://github.com/omni-scrna/boilerplate
  ref: main
  lang: python

# benchmark(s) this module works with
benchmarks:
  - name: split-stages
    repo: https://github.com/omni-scrna/split-stages-plan
    plan: benchmark_conda.yaml
    ref: new-stage-naming
