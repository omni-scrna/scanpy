# OmniBenchmark Module Configuration

entrypoints:
  pca: pca.py
  pca-prof: denet pca.py
  knn: knn.py

# Shared scaffolding (CLI engine + universal _base schema) vendored under common/
# from a ref. Interim, pre-`ob`: `pixi run pull` (from this module root) refreshes
# it. See https://github.com/omni-scrna/boilerplate.
boilerplate:
  repo: https://github.com/omni-scrna/boilerplate
  ref: main            # track the tip (unpinned); common/VERSION witnesses what we carry
  lang: python

# Benchmark(s) whose stages this module implements.
template-for:
  - { name: split-stages, repo: https://github.com/omni-scrna/split-stages-plan, plan: benchmark_conda.yaml, ref: main }

# Stage interfaces this module satisfies, as <benchmark-label>/<interface>@<version>.
# Each <interface>.json (the stage I/O contract) is benchmark-owned and injected
# onto the entrypoint's parser via common/cli.add_stage_args(); this module's own
# method params are hand-rolled in the entrypoint (pca.py / knn.py).
implements:
  - split-stages/pca@0.1.0
  - split-stages/knn@0.1.0
